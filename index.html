<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg: #f0ebe3;
–card: #faf7f2;
–shadow-color: #d9c9b5;
–text-primary: #3a2f24;
–text-secondary: #8c7b6b;
–accent: #e8673a;
–accent-light: #fde8df;
–btn-num: #ffffff;
–btn-op: #fff3ed;
–btn-eq: #e8673a;
–btn-clear: #3a2f24;
–display-bg: #fdf5ec;
}

body {
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
background-color: var(–bg);
background-image:
radial-gradient(circle at 20% 20%, #f5ddd0 0%, transparent 45%),
radial-gradient(circle at 80% 80%, #ddeef5 0%, transparent 45%),
url(“data:image/svg+xml,%3Csvg width=‘40’ height=‘40’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Ccircle cx=‘20’ cy=‘20’ r=‘1’ fill=’%23c9b8a8’ opacity=‘0.4’/%3E%3C/svg%3E”);
font-family: ‘Nunito’, sans-serif;
}

.calc-wrapper {
position: relative;
}

/* Decorative blob behind the calc */
.calc-wrapper::before {
content: ‘’;
position: absolute;
inset: -20px;
background: radial-gradient(ellipse at 60% 40%, #f5c4ae55, transparent 70%),
radial-gradient(ellipse at 30% 70%, #aed8f555, transparent 70%);
border-radius: 60% 40% 60% 40% / 40% 60% 40% 60%;
filter: blur(20px);
z-index: 0;
}

.calculator {
position: relative;
z-index: 1;
background: var(–card);
border-radius: 28px;
padding: 24px;
width: 320px;
box-shadow:
0 2px 0 0 var(–shadow-color),
0 4px 0 0 #cbb89e,
0 8px 32px rgba(58, 47, 36, 0.12),
0 2px 8px rgba(58, 47, 36, 0.08);
border: 1.5px solid rgba(255,255,255,0.8);
}

/* Top label */
.calc-label {
display: flex;
align-items: center;
gap: 8px;
margin-bottom: 16px;
}

.calc-label .dot {
width: 10px; height: 10px;
border-radius: 50%;
background: var(–accent);
box-shadow: 0 0 0 3px var(–accent-light);
}

.calc-label span {
font-size: 11px;
font-weight: 700;
letter-spacing: 0.15em;
text-transform: uppercase;
color: var(–text-secondary);
}

/* Display */
.display {
background: var(–display-bg);
border-radius: 18px;
padding: 18px 20px 14px;
margin-bottom: 20px;
min-height: 100px;
display: flex;
flex-direction: column;
justify-content: flex-end;
align-items: flex-end;
border: 1.5px solid #ecddd0;
position: relative;
overflow: hidden;
}

.display::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 3px;
background: linear-gradient(90deg, transparent, #e8673a44, transparent);
border-radius: 18px 18px 0 0;
}

.expression {
font-family: ‘DM Mono’, monospace;
font-size: 13px;
color: var(–text-secondary);
min-height: 20px;
text-align: right;
word-break: break-all;
transition: all 0.2s ease;
}

.result {
font-family: ‘DM Mono’, monospace;
font-size: 40px;
font-weight: 500;
color: var(–text-primary);
text-align: right;
word-break: break-all;
line-height: 1.1;
transition: transform 0.15s ease, color 0.15s ease;
}

.result.pop {
transform: scale(1.04);
color: var(–accent);
}

/* Grid */
.buttons {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 10px;
}

/* Base button */
button {
position: relative;
border: none;
cursor: pointer;
border-radius: 14px;
font-family: ‘Nunito’, sans-serif;
font-size: 18px;
font-weight: 700;
height: 60px;
transition:
transform 0.08s ease,
box-shadow 0.08s ease,
background 0.15s ease;
outline: none;
-webkit-tap-highlight-color: transparent;
user-select: none;
}

/* Number buttons */
button.num {
background: var(–btn-num);
color: var(–text-primary);
box-shadow:
0 3px 0 #d9c9b5,
0 4px 10px rgba(58,47,36,0.08);
border: 1.5px solid #ede0d0;
}

button.num:hover {
background: #fff9f5;
transform: translateY(-1px);
box-shadow: 0 4px 0 #d9c9b5, 0 6px 14px rgba(58,47,36,0.1);
}

button.num:active {
transform: translateY(2px);
box-shadow: 0 1px 0 #d9c9b5;
}

/* Operator buttons */
button.op {
background: var(–btn-op);
color: var(–accent);
box-shadow:
0 3px 0 #f2c9b6,
0 4px 10px rgba(232,103,58,0.1);
border: 1.5px solid #fad4c3;
}

button.op:hover {
background: #fff0ea;
transform: translateY(-1px);
box-shadow: 0 4px 0 #f2c9b6, 0 6px 14px rgba(232,103,58,0.15);
}

button.op:active {
transform: translateY(2px);
box-shadow: 0 1px 0 #f2c9b6;
}

/* Equals button */
button.eq {
background: var(–btn-eq);
color: white;
box-shadow:
0 3px 0 #c0441a,
0 4px 14px rgba(232,103,58,0.35);
border: 1.5px solid #d95a28;
}

button.eq:hover {
background: #ef7348;
transform: translateY(-1px);
box-shadow: 0 4px 0 #c0441a, 0 8px 20px rgba(232,103,58,0.4);
}

button.eq:active {
transform: translateY(2px);
box-shadow: 0 1px 0 #c0441a;
}

/* Clear button */
button.clear {
background: var(–btn-clear);
color: white;
box-shadow:
0 3px 0 #1e160e,
0 4px 10px rgba(58,47,36,0.2);
border: 1.5px solid #2e231a;
font-size: 13px;
letter-spacing: 0.05em;
}

button.clear:hover {
background: #4a3e32;
transform: translateY(-1px);
box-shadow: 0 4px 0 #1e160e, 0 6px 14px rgba(58,47,36,0.25);
}

button.clear:active {
transform: translateY(2px);
box-shadow: 0 1px 0 #1e160e;
}

/* Special: span 2 cols */
button.span2 {
grid-column: span 2;
font-size: 15px;
letter-spacing: 0.02em;
}

/* Ripple */
.ripple {
position: absolute;
border-radius: 50%;
transform: scale(0);
animation: ripple-anim 0.4s linear;
background: rgba(255,255,255,0.35);
pointer-events: none;
}

@keyframes ripple-anim {
to { transform: scale(4); opacity: 0; }
}

/* Active operator highlight */
button.op.active-op {
background: var(–accent);
color: white;
box-shadow: 0 3px 0 #c0441a, 0 4px 14px rgba(232,103,58,0.35);
border-color: #d95a28;
}
</style>

</head>
<body>

<div class="calc-wrapper">
  <div class="calculator">
    <div class="calc-label">
      <div class="dot"></div>
      <span>Calculadora</span>
    </div>

<script>
  let currentInput = '0';
  let operator = null;
  let previousInput = null;
  let shouldResetScreen = false;
  let expression = '';
  let justCalculated = false;

  const resultEl = document.getElementById('result');
  const expressionEl = document.getElementById('expression');

  function updateDisplay(value) {
    let display = value;
    if (display.length > 12) {
      display = parseFloat(parseFloat(display).toPrecision(8)).toString();
    }
    resultEl.textContent = display;
  }

  function popAnimation() {
    resultEl.classList.remove('pop');
    void resultEl.offsetWidth;
    resultEl.classList.add('pop');
    setTimeout(() => resultEl.classList.remove('pop'), 200);
  }

  function addDigit(digit) {
    if (justCalculated) {
      currentInput = digit;
      expression = '';
      justCalculated = false;
      operator = null;
      previousInput = null;
    } else if (shouldResetScreen) {
      currentInput = digit;
      shouldResetScreen = false;
    } else {
      if (currentInput === '0' && digit !== '.') {
        currentInput = digit;
      } else if (currentInput.length < 12) {
        currentInput += digit;
      }
    }
    updateDisplay(currentInput);
  }

  function addDot() {
    if (justCalculated) {
      currentInput = '0.';
      expression = '';
      justCalculated = false;
      operator = null;
      previousInput = null;
    } else if (shouldResetScreen) {
      currentInput = '0.';
      shouldResetScreen = false;
    } else if (!currentInput.includes('.')) {
      currentInput += '.';
    }
    updateDisplay(currentInput);
  }

  function setOp(op) {
    justCalculated = false;
    if (operator && !shouldResetScreen) {
      calculate(true);
    }
    previousInput = currentInput;
    operator = op;
    shouldResetScreen = true;

    const opSymbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
    expression = previousInput + ' ' + opSymbols[op];
    expressionEl.textContent = expression;

    // Highlight active operator button
    document.querySelectorAll('button.op').forEach(b => b.classList.remove('active-op'));
    const opTexts = { '+': '+', '-': '−', '*': '×', '/': '÷' };
    document.querySelectorAll('button.op').forEach(b => {
      if (b.textContent.trim() === opTexts[op]) b.classList.add('active-op');
    });
  }

  function calculate(silent = false) {
    if (!operator || previousInput === null) return;

    const a = parseFloat(previousInput);
    const b = parseFloat(currentInput);
    let result;

    switch (operator) {
      case '+': result = a + b; break;
      case '-': result = a - b; break;
      case '*': result = a * b; break;
      case '/':
        if (b === 0) { currentInput = 'Erro'; updateDisplay('Erro'); clearState(); return; }
        result = a / b; break;
    }

    const opSymbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
    if (!silent) {
      expression = previousInput + ' ' + opSymbols[operator] + ' ' + currentInput + ' =';
      expressionEl.textContent = expression;
      popAnimation();
      justCalculated = true;
    }

    const resultStr = parseFloat(result.toPrecision(12)).toString();
    currentInput = resultStr;
    operator = null;
    previousInput = null;
    shouldResetScreen = true;

    document.querySelectorAll('button.op').forEach(b => b.classList.remove('active-op'));
    updateDisplay(currentInput);
  }

  function clearAll() {
    currentInput = '0';
    operator = null;
    previousInput = null;
    shouldResetScreen = false;
    justCalculated = false;
    expression = '';
    expressionEl.textContent = '';
    updateDisplay('0');
    document.querySelectorAll('button.op').forEach(b => b.classList.remove('active-op'));
  }

  function clearState() {
    operator = null;
    previousInput = null;
    shouldResetScreen = false;
    justCalculated = false;
    expression = '';
  }

  function backspace() {
    if (justCalculated || shouldResetScreen) { clearAll(); return; }
    if (currentInput.length <= 1 || currentInput === '-0') {
      currentInput = '0';
    } else {
      currentInput = currentInput.slice(0, -1);
    }
    updateDisplay(currentInput);
  }

  function percent() {
    const val = parseFloat(currentInput);
    if (isNaN(val)) return;
    if (previousInput !== null && operator) {
      currentInput = String(parseFloat(previousInput) * val / 100);
    } else {
      currentInput = String(val / 100);
    }
    updateDisplay(currentInput);
  }

  // Ripple effect
  document.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', function(e) {
      const ripple = document.createElement('span');
      ripple.classList.add('ripple');
      const rect = btn.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
      ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
      btn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 400);
    });
  });

  // Keyboard support
  document.addEventListener('keydown', e => {
    if ('0123456789'.includes(e.key)) addDigit(e.key);
    else if (e.key === '.') addDot();
    else if (e.key === '+') setOp('+');
    else if (e.key === '-') setOp('-');
    else if (e.key === '*') setOp('*');
    else if (e.key === '/') { e.preventDefault(); setOp('/'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Backspace') backspace();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === '%') percent();
  });
</script>

</body>
</html>
